<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tailor Shop Manager</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="container">
    <h1>Tailor Shop Manager</h1>

    <section class="card">
      <h2>Search Customers</h2>
      <div class="row">
        <input id="searchInput" type="text" placeholder="Search by name or phone" />
        <button id="searchBtn">Search</button>
      </div>
      <div id="customerList" class="list"></div>
    </section>

    <section class="card">
      <h2>Add New Customer</h2>
      <form id="customerForm">
        <input required name="name" placeholder="Customer Name" />
        <input required name="phone" placeholder="Phone Number" />
        <input name="address" placeholder="Address" />
        <label>Date <input required type="date" name="registration_date" /></label>
        <textarea name="notes" placeholder="General Notes"></textarea>

        <h3>Measurements</h3>
        <div class="grid-2">
          <input type="number" step="0.1" name="neck" placeholder="Neck" />
          <input type="number" step="0.1" name="chest" placeholder="Chest" />
          <input type="number" step="0.1" name="shoulder" placeholder="Shoulder" />
          <input type="number" step="0.1" name="sleeve_length" placeholder="Sleeve Length" />
          <input type="number" step="0.1" name="shirt_length" placeholder="Shirt Length" />
          <input type="number" step="0.1" name="waist" placeholder="Waist" />
          <input type="number" step="0.1" name="hip" placeholder="Hip" />
          <input type="number" step="0.1" name="trouser_length" placeholder="Trouser Length" />
        </div>
        <textarea name="measurement_notes" placeholder="Measurement Notes"></textarea>

        <button type="submit" class="primary">Save Customer</button>
      </form>
    </section>

    <section class="card hidden" id="profileSection">
      <h2>Customer Profile</h2>
      <div id="profileContent"></div>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
